<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>드론 시티 월드투어</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; background:#0a0e1a; font-family:'Segoe UI', 'Malgun Gothic', sans-serif; touch-action:none; overscroll-behavior:none; }
  #map { position:absolute; inset:0; }
  .maplibregl-ctrl-attrib { font-size:9px !important; opacity:.6; }

  /* ===== 시작 화면 ===== */
  #startScreen {
    position:absolute; inset:0; z-index:100;
    background:radial-gradient(ellipse at 50% 30%, #1a2747 0%, #0a0e1a 70%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:20px; overflow-y:auto; touch-action:pan-y;
  }
  #startScreen h1 { color:#fff; font-size:clamp(26px,7vw,42px); letter-spacing:2px; margin-bottom:4px; text-shadow:0 0 24px rgba(64,156,255,.8); }
  #startScreen .sub { color:#7fa8d9; font-size:clamp(12px,3.5vw,15px); margin-bottom:24px; }
  .cityGrid { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:10px; width:100%; max-width:560px; margin-bottom:24px; }
  .cityBtn {
    background:rgba(30,50,90,.55); border:1px solid rgba(100,160,255,.35); border-radius:14px;
    color:#dce9ff; padding:14px 8px; font-size:15px; cursor:pointer; text-align:center;
    transition:all .15s; backdrop-filter:blur(4px);
  }
  .cityBtn .flag { font-size:26px; display:block; margin-bottom:4px; }
  .cityBtn .en { font-size:10px; color:#7fa8d9; display:block; margin-top:2px; }
  .cityBtn.sel { background:rgba(64,156,255,.45); border-color:#69b1ff; box-shadow:0 0 16px rgba(64,156,255,.6); transform:scale(1.04); }
  #launchBtn {
    background:linear-gradient(135deg,#2f7bff,#00c2ff); border:none; border-radius:30px;
    color:#fff; font-size:19px; font-weight:700; padding:15px 60px; cursor:pointer; letter-spacing:4px;
    box-shadow:0 6px 24px rgba(0,150,255,.5);
  }
  #launchBtn:active { transform:scale(.96); }
  .hint { color:#5a7baa; font-size:11px; margin-top:16px; text-align:center; line-height:1.6; }

  /* ===== 로딩 ===== */
  #loading { position:absolute; inset:0; z-index:90; background:#0a0e1a; display:none; flex-direction:column; align-items:center; justify-content:center; color:#7fa8d9; }
  .spinner { width:46px; height:46px; border:3px solid rgba(100,160,255,.2); border-top-color:#69b1ff; border-radius:50%; animation:spin 1s linear infinite; margin-bottom:16px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ===== HUD ===== */
  #hud { position:absolute; inset:0; z-index:50; pointer-events:none; display:none; }
  #hud.on { display:block; }

  #topBar {
    position:absolute; top:env(safe-area-inset-top, 8px); left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:14px;
    background:rgba(8,14,28,.66); border:1px solid rgba(100,160,255,.3); border-radius:22px;
    padding:7px 18px; backdrop-filter:blur(6px); margin-top:8px;
  }
  #cityLabel { color:#fff; font-size:15px; font-weight:600; white-space:nowrap; }
  #compass { color:#69d2ff; font-size:13px; font-weight:700; min-width:42px; text-align:center; font-variant-numeric:tabular-nums; }

  .gauge {
    position:absolute; background:rgba(8,14,28,.66); border:1px solid rgba(100,160,255,.3);
    border-radius:12px; padding:6px 12px; backdrop-filter:blur(6px); color:#fff;
  }
  .gauge .lbl { font-size:9px; color:#7fa8d9; letter-spacing:1px; }
  .gauge .val { font-size:17px; font-weight:700; font-variant-numeric:tabular-nums; }
  .gauge .unit { font-size:10px; color:#9bc1f0; }
  #altGauge { top:70px; left:12px; }
  #spdGauge { top:70px; right:12px; text-align:right; }

  #menuBtn {
    position:absolute; top:calc(env(safe-area-inset-top, 8px) + 8px); right:12px;
    width:42px; height:42px; border-radius:50%; pointer-events:auto;
    background:rgba(8,14,28,.66); border:1px solid rgba(100,160,255,.3); backdrop-filter:blur(6px);
    color:#dce9ff; font-size:18px; cursor:pointer;
  }

  /* 조이스틱 */
  .stick {
    position:absolute; bottom:calc(env(safe-area-inset-bottom, 0px) + 26px);
    width:124px; height:124px; border-radius:50%; pointer-events:auto;
    background:rgba(20,35,65,.35); border:2px solid rgba(100,160,255,.4); backdrop-filter:blur(3px);
  }
  #stickL { left:22px; } #stickR { right:22px; }
  .knob {
    position:absolute; left:50%; top:50%; width:54px; height:54px; border-radius:50%;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle at 35% 30%, rgba(140,195,255,.95), rgba(45,110,210,.9));
    box-shadow:0 3px 12px rgba(0,0,0,.5), 0 0 14px rgba(64,156,255,.45);
  }
  .stickTag { position:absolute; top:-20px; width:100%; text-align:center; color:#7fa8d9; font-size:10px; letter-spacing:1px; }

  /* 고도 버튼 */
  #altCtrl { position:absolute; right:34px; bottom:calc(env(safe-area-inset-bottom, 0px) + 168px); display:flex; flex-direction:column; gap:10px; pointer-events:auto; }
  .altBtn {
    width:52px; height:52px; border-radius:50%; border:1px solid rgba(100,160,255,.45);
    background:rgba(20,35,65,.6); color:#bfe0ff; font-size:21px; backdrop-filter:blur(3px); cursor:pointer;
  }
  .altBtn:active { background:rgba(64,156,255,.6); }

  /* 터보 */
  #turboBtn {
    position:absolute; left:34px; bottom:calc(env(safe-area-inset-bottom, 0px) + 168px);
    width:58px; height:58px; border-radius:50%; pointer-events:auto;
    border:1px solid rgba(255,170,60,.55); background:rgba(80,45,10,.55);
    color:#ffd28a; font-size:11px; font-weight:700; backdrop-filter:blur(3px); cursor:pointer; letter-spacing:1px;
  }
  #turboBtn.on { background:rgba(255,150,30,.75); color:#fff; box-shadow:0 0 18px rgba(255,160,40,.8); }

  /* 도시 변경 패널 */
  #cityPanel {
    position:absolute; inset:0; z-index:60; display:none; align-items:center; justify-content:center;
    background:rgba(5,9,18,.82); pointer-events:auto; padding:20px;
  }
  #cityPanel.on { display:flex; }
  #cityPanel .box { width:100%; max-width:520px; max-height:80vh; overflow-y:auto; touch-action:pan-y; }
  #cityPanel h2 { color:#fff; text-align:center; margin-bottom:14px; font-size:18px; }
  #closePanel { display:block; margin:16px auto 0; background:none; border:1px solid rgba(150,180,220,.4); color:#9bc1f0; border-radius:20px; padding:8px 32px; font-size:14px; cursor:pointer; }

  /* 드론 십자선 */
  #cross { position:absolute; left:50%; top:46%; transform:translate(-50%,-50%); color:rgba(120,220,140,.85); font-size:20px; text-shadow:0 0 6px rgba(0,255,100,.5); }
  #vignette { position:absolute; inset:0; box-shadow:inset 0 0 120px rgba(0,10,30,.55); }
</style>
</head>
<body>

<div id="map"></div>

<!-- 시작 화면 -->
<div id="startScreen">
  <h1>🚁 드론 시티 월드투어</h1>
  <div class="sub">위성 영상 + 실제 건물 사이를 드론으로 비행하세요</div>
  <div class="cityGrid" id="cityGrid"></div>
  <button id="launchBtn">이 륙</button>
  <div class="hint">
    📱 왼쪽 스틱: 전진·후진·좌우이동 | 오른쪽 스틱: 방향·시선<br>
    ▲▼ 버튼: 고도 | TURBO: 가속 &nbsp;·&nbsp; 💻 키보드: WASD + 방향키 + Q/E
  </div>
</div>

<!-- 로딩 -->
<div id="loading"><div class="spinner"></div><div id="loadingText">위성 영상·건물 데이터 수신 중...</div></div>

<!-- HUD -->
<div id="hud">
  <div id="vignette"></div>
  <div id="cross">[ + ]</div>
  <div id="topBar"><span id="cityLabel">서울</span><span id="compass">N 0°</span></div>
  <div class="gauge" id="altGauge"><div class="lbl">ALTITUDE 고도</div><div class="val"><span id="altVal">250</span><span class="unit"> m</span></div></div>
  <div class="gauge" id="spdGauge"><div class="lbl">SPEED 속도</div><div class="val"><span id="spdVal">0</span><span class="unit"> km/h</span></div></div>
  <button id="menuBtn">🌍</button>
  <button id="turboBtn">TURBO</button>
  <div id="altCtrl">
    <button class="altBtn" id="altUp">▲</button>
    <button class="altBtn" id="altDn">▼</button>
  </div>
  <div class="stick" id="stickL"><div class="stickTag">MOVE</div><div class="knob" id="knobL"></div></div>
  <div class="stick" id="stickR"><div class="stickTag">LOOK</div><div class="knob" id="knobR"></div></div>
</div>

<!-- 도시 변경 패널 -->
<div id="cityPanel">
  <div class="box">
    <h2>🌍 도시 선택</h2>
    <div class="cityGrid" id="cityGrid2"></div>
    <button id="closePanel">닫기</button>
  </div>
</div>

<script>
// ================= PWA 등록 =================
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

// ================= 도시 데이터 (마천루 밀집 지점에서 출발) =================
const CITIES = [
  { name:'서울 · 롯데타워',   en:'Seoul',         flag:'🇰🇷', lng:127.0915, lat:37.5048, alt:330, bearing:48  },
  { name:'뉴욕 · 맨해튼',     en:'New York',      flag:'🇺🇸', lng:-73.9819, lat:40.7480, alt:300, bearing:30  },
  { name:'도쿄 · 신주쿠',     en:'Tokyo',         flag:'🇯🇵', lng:139.6940, lat:35.6850, alt:250, bearing:0   },
  { name:'파리 · 에펠탑',     en:'Paris',         flag:'🇫🇷', lng:2.2920,   lat:48.8535, alt:240, bearing:25  },
  { name:'런던 · 시티',       en:'London',        flag:'🇬🇧', lng:-0.0900,  lat:51.5090, alt:230, bearing:320 },
  { name:'두바이 · 부르즈',   en:'Dubai',         flag:'🇦🇪', lng:55.2790,  lat:25.1880, alt:420, bearing:300 },
  { name:'홍콩 · 센트럴',     en:'Hong Kong',     flag:'🇭🇰', lng:114.1650, lat:22.2730, alt:280, bearing:340 },
  { name:'싱가포르 · 마리나', en:'Singapore',     flag:'🇸🇬', lng:103.8590, lat:1.2790,  alt:230, bearing:320 },
  { name:'시드니 · 하버',     en:'Sydney',        flag:'🇦🇺', lng:151.2110, lat:-33.8680, alt:240, bearing:350 },
  { name:'샌프란시스코',      en:'San Francisco', flag:'🇺🇸', lng:-122.3960, lat:37.7880, alt:260, bearing:310 },
  { name:'상하이 · 루자주이', en:'Shanghai',      flag:'🇨🇳', lng:121.5060, lat:31.2330, alt:320, bearing:280 },
  { name:'바르셀로나',        en:'Barcelona',     flag:'🇪🇸', lng:2.1744,   lat:41.4016, alt:220, bearing:340 },
];

// ================= 비행 상태 =================
const S = {
  lng:0, lat:0, alt:250, bearing:0, pitch:78,
  vFwd:0, vSide:0, vAlt:0, vYaw:0,   // 부드러운 가속용 현재 속도
  turbo:false, flying:false, speedKmh:0,
};
const MIN_ALT = 8, MAX_ALT = 2000;

// ================= 지도 스타일 (위성 + 3D 건물) =================
const STYLE = {
  version: 8,
  glyphs: 'https://tiles.openfreemap.org/fonts/{fontstack}/{range}.pbf',
  sources: {
    sat: {
      type: 'raster', tileSize: 256, maxzoom: 19,
      tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
      attribution: 'Imagery © Esri, Maxar, Earthstar Geographics',
    },
    omt: { type: 'vector', url: 'https://tiles.openfreemap.org/planet' },
  },
  layers: [
    { id:'bg', type:'background', paint:{ 'background-color':'#0a0e1a' } },
    { id:'satellite', type:'raster', source:'sat',
      paint:{ 'raster-fade-duration':150, 'raster-brightness-min':0.05, 'raster-saturation':0.15, 'raster-contrast':0.05 } },
    { id:'3d-buildings', type:'fill-extrusion', source:'omt', 'source-layer':'building', minzoom:13,
      filter:['!=', ['get','hide_3d'], true],
      paint:{
        'fill-extrusion-color':[
          'interpolate', ['linear'], ['coalesce', ['get','render_height'], 12],
          0,   '#8d96a3',
          40,  '#a7b3c4',
          120, '#c4d2e3',
          300, '#e8f0fa'
        ],
        'fill-extrusion-height':['coalesce', ['get','render_height'], 12],
        'fill-extrusion-base':['coalesce', ['get','render_min_height'], 0],
        'fill-extrusion-opacity':0.95,
        'fill-extrusion-vertical-gradient':true,
      } },
  ],
};

// ================= 지도 =================
let map = null;
function initMap(city) {
  map = new maplibregl.Map({
    container:'map',
    style:STYLE,
    center:[city.lng, city.lat], zoom:16, pitch:60, bearing:city.bearing,
    attributionControl:{compact:true},
    interactive:false,   // 조종은 게임 컨트롤로만
    maxPitch:85,
  });
  map.on('load', () => {
    try { map.setSky({ 'sky-color':'#7fb8e8', 'horizon-color':'#d9e9f5', 'fog-color':'#cfe0ee', 'sky-horizon-blend':0.7, 'horizon-fog-blend':0.6, 'fog-ground-blend':0.85 }); } catch(e){}
    try { map.setLight({ anchor:'viewport', color:'#fff8ec', intensity:0.45, position:[1.3, 200, 50] }); } catch(e){}
    document.getElementById('loading').style.display = 'none';
    document.getElementById('hud').classList.add('on');
    S.flying = true;
  });
  map.on('error', (e) => {
    if (e && e.error && /style/i.test(String(e.error.message||''))) {
      document.getElementById('loadingText').textContent = '⚠️ 지도 로딩 실패 — 인터넷 연결을 확인하세요';
    }
  });
}

// ================= 카메라 적용 =================
// 드론(카메라) 위치·고도·시선각으로부터 지도 중심점과 줌을 역산해 jumpTo
function applyCamera() {
  const tr = map.transform;
  const fovRad = (typeof tr._fov === 'number') ? tr._fov
               : (typeof tr.fov === 'number' ? (tr.fov > 3 ? tr.fov*Math.PI/180 : tr.fov) : 0.6435);
  const pitchRad = S.pitch * Math.PI/180;
  const radB = S.bearing * Math.PI/180;
  // 카메라가 바라보는 지면 지점 = 드론 위치에서 전방 alt*tan(pitch) 미터
  const fwd = S.alt * Math.tan(pitchRad);
  const cLat = S.lat + fwd*Math.cos(radB)/111320;
  const cLng = S.lng + fwd*Math.sin(radB)/(111320*Math.cos(S.lat*Math.PI/180));
  // 카메라-중심점 거리(m) → 줌 레벨
  const dist = S.alt / Math.cos(pitchRad);
  const mpp = dist * 2 * Math.tan(fovRad/2) / tr.height;   // 화면 중심 미터/픽셀
  const zoom = Math.log2(40075016.686 * Math.cos(cLat*Math.PI/180) / (512 * mpp));
  map.jumpTo({ center:[cLng, cLat], zoom:zoom, pitch:S.pitch, bearing:S.bearing });
}

// ================= 입력: 가상 조이스틱 =================
function makeStick(stickEl, knobEl) {
  const st = { x:0, y:0, id:null };
  const R = 44;
  function setKnob(dx, dy) { knobEl.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; }
  function handle(ev) {
    const t = [...ev.changedTouches].find(t => t.identifier === st.id);
    if (!t) return;
    const r = stickEl.getBoundingClientRect();
    let dx = t.clientX - (r.left + r.width/2);
    let dy = t.clientY - (r.top + r.height/2);
    const d = Math.hypot(dx, dy);
    if (d > R) { dx = dx/d*R; dy = dy/d*R; }
    st.x = dx/R; st.y = dy/R;
    setKnob(dx, dy);
  }
  stickEl.addEventListener('touchstart', ev => {
    ev.preventDefault();
    if (st.id === null) { st.id = ev.changedTouches[0].identifier; handle(ev); }
  }, {passive:false});
  stickEl.addEventListener('touchmove', ev => { ev.preventDefault(); handle(ev); }, {passive:false});
  function end(ev) {
    if ([...ev.changedTouches].some(t => t.identifier === st.id)) {
      st.id = null; st.x = 0; st.y = 0; setKnob(0,0);
    }
  }
  stickEl.addEventListener('touchend', end);
  stickEl.addEventListener('touchcancel', end);
  // 마우스(데스크톱 테스트용)
  stickEl.addEventListener('mousedown', ev => {
    const mv = e => {
      const r = stickEl.getBoundingClientRect();
      let dx = e.clientX-(r.left+r.width/2), dy = e.clientY-(r.top+r.height/2);
      const d = Math.hypot(dx,dy); if (d>R){dx=dx/d*R;dy=dy/d*R;}
      st.x=dx/R; st.y=dy/R; setKnob(dx,dy);
    };
    const up = () => { st.x=0; st.y=0; setKnob(0,0); window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up); };
    window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up); mv(ev);
  });
  return st;
}
const stickL = makeStick(document.getElementById('stickL'), document.getElementById('knobL'));
const stickR = makeStick(document.getElementById('stickR'), document.getElementById('knobR'));

// 고도 버튼 (홀드)
const held = { up:false, dn:false };
function holdBtn(el, key) {
  const on  = e => { e.preventDefault(); held[key] = true; };
  const off = e => { e.preventDefault(); held[key] = false; };
  el.addEventListener('touchstart', on, {passive:false});
  el.addEventListener('touchend', off); el.addEventListener('touchcancel', off);
  el.addEventListener('mousedown', on); window.addEventListener('mouseup', () => held[key]=false);
}
holdBtn(document.getElementById('altUp'), 'up');
holdBtn(document.getElementById('altDn'), 'dn');

// 터보 토글
const turboBtn = document.getElementById('turboBtn');
function toggleTurbo(e){ e.preventDefault(); S.turbo = !S.turbo; turboBtn.classList.toggle('on', S.turbo); }
turboBtn.addEventListener('touchstart', toggleTurbo, {passive:false});
turboBtn.addEventListener('mousedown', toggleTurbo);

// 키보드 (데스크톱)
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; if (e.code==='ShiftLeft'){S.turbo=true; turboBtn.classList.add('on');} });
window.addEventListener('keyup',   e => { keys[e.code] = false; if (e.code==='ShiftLeft'){S.turbo=false; turboBtn.classList.remove('on');} });

// ================= 게임 루프 =================
let lastT = 0;
function loop(t) {
  requestAnimationFrame(loop);
  if (!S.flying || !map) return;
  const dt = Math.min((t - lastT)/1000, 0.05); lastT = t;
  if (dt <= 0) return;

  // 입력 수집 (조이스틱 + 키보드)
  let inFwd  = -stickL.y + (keys['KeyW']?1:0) - (keys['KeyS']?1:0);
  let inSide =  stickL.x + (keys['KeyD']?1:0) - (keys['KeyA']?1:0);
  let inYaw  =  stickR.x + (keys['ArrowRight']?1:0) - (keys['ArrowLeft']?1:0);
  let inPit  = -stickR.y + (keys['ArrowUp']?1:0) - (keys['ArrowDown']?1:0);
  let inAlt  = (held.up?1:0) - (held.dn?1:0) + (keys['KeyE']?1:0) - (keys['KeyQ']?1:0);
  inFwd = Math.max(-1, Math.min(1, inFwd)); inSide = Math.max(-1, Math.min(1, inSide));
  inYaw = Math.max(-1, Math.min(1, inYaw)); inAlt = Math.max(-1, Math.min(1, inAlt));

  // 속도 설정 (저고도에서는 느리게 — 빌딩 사이 정밀 비행)
  const altFactor = 0.5 + S.alt/400;
  const maxSpd = (S.turbo ? 80 : 30) * altFactor;   // m/s
  const accel = 3.2;

  // 부드러운 가감속 (지수 보간)
  const k = 1 - Math.exp(-accel*dt);
  S.vFwd  += (inFwd  * maxSpd        - S.vFwd ) * k;
  S.vSide += (inSide * maxSpd * 0.7  - S.vSide) * k;
  S.vAlt  += (inAlt  * (S.turbo?120:60) - S.vAlt ) * k;
  S.vYaw  += (inYaw  * 75            - S.vYaw ) * k;

  // 방향·시선
  S.bearing = (S.bearing + S.vYaw*dt + 360) % 360;
  S.pitch = Math.max(25, Math.min(84, S.pitch + inPit*45*dt));

  // 이동 (헤딩 기준 전진/측면 — 우측 이동 벡터는 bearing+90°)
  const rad = S.bearing * Math.PI/180;
  S.lat += (S.vFwd*Math.cos(rad) - S.vSide*Math.sin(rad)) * dt / 111320;
  S.lng += (S.vFwd*Math.sin(rad) + S.vSide*Math.cos(rad)) * dt / (111320*Math.cos(S.lat*Math.PI/180));
  S.alt = Math.max(MIN_ALT, Math.min(MAX_ALT, S.alt + S.vAlt*dt));
  S.lat = Math.max(-85, Math.min(85, S.lat));

  applyCamera();

  // HUD 갱신
  S.speedKmh = Math.hypot(S.vFwd, S.vSide) * 3.6;
  document.getElementById('altVal').textContent = Math.round(S.alt);
  document.getElementById('spdVal').textContent = Math.round(S.speedKmh);
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  document.getElementById('compass').textContent = dirs[Math.round(S.bearing/45)%8] + ' ' + Math.round(S.bearing) + '°';
}
requestAnimationFrame(loop);

// ================= 도시 선택 UI =================
let selCity = CITIES[0];
function buildGrid(containerId, onPick) {
  const g = document.getElementById(containerId);
  g.innerHTML = '';
  CITIES.forEach(c => {
    const b = document.createElement('button');
    b.className = 'cityBtn' + (c === selCity ? ' sel' : '');
    b.innerHTML = `<span class="flag">${c.flag}</span>${c.name}<span class="en">${c.en}</span>`;
    b.onclick = () => onPick(c, b);
    g.appendChild(b);
  });
}
buildGrid('cityGrid', (c, b) => {
  selCity = c;
  document.querySelectorAll('#cityGrid .cityBtn').forEach(x => x.classList.remove('sel'));
  b.classList.add('sel');
});

document.getElementById('launchBtn').onclick = () => {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  goCity(selCity, true);
};

function goCity(c, first) {
  S.lng = c.lng; S.lat = c.lat; S.alt = c.alt; S.bearing = c.bearing; S.pitch = 78;
  S.vFwd = S.vSide = S.vAlt = S.vYaw = 0;
  document.getElementById('cityLabel').textContent = c.flag + ' ' + c.name;
  if (first) { initMap(c); }
  else { applyCamera(); }
  // 전체화면 시도 (모바일)
  if (first && document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(()=>{});
  }
}

// 비행 중 도시 변경
document.getElementById('menuBtn').onclick = () => {
  buildGrid('cityGrid2', (c) => {
    selCity = c;
    document.getElementById('cityPanel').classList.remove('on');
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('loadingText').textContent = c.name + ' 이동 중...';
    goCity(c, false);
    setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 900);
  });
  document.getElementById('cityPanel').classList.add('on');
};
document.getElementById('closePanel').onclick = () => document.getElementById('cityPanel').classList.remove('on');

// 화면 회전/리사이즈
window.addEventListener('resize', () => { if (map) map.resize(); });
</script>
